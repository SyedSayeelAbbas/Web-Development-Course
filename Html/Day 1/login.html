<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Part 1 Thumbnail</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px;
    height: 720px;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
  }

  .bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,120,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,120,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  .bg-glow-green {
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,255,120,0.12) 0%, transparent 70%);
    top: -100px; left: -100px;
    pointer-events: none;
  }

  .bg-glow-blue {
    position: absolute;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(0,180,255,0.10) 0%, transparent 70%);
    bottom: -80px; right: 60px;
    pointer-events: none;
  }

  .content {
    position: relative;
    display: flex;
    align-items: flex-start;
    gap: 72px;
    padding: 60px 80px;
  }

  .left {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .html-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 210px;
    line-height: 0.9;
    letter-spacing: 4px;
    color: #00ff78;
    text-shadow:
      0 0 20px rgba(0,255,120,0.9),
      0 0 50px rgba(0,255,120,0.6),
      0 0 100px rgba(0,255,120,0.3),
      0 0 180px rgba(0,255,120,0.15);
  }

  .part-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 36px;
    letter-spacing: 10px;
    color: #00b4ff;
    text-transform: uppercase;
    text-shadow:
      0 0 12px rgba(0,180,255,0.8),
      0 0 30px rgba(0,180,255,0.4);
    margin-top: 4px;
    padding-left: 6px;
  }

  .divider {
    width: 2px;
    height: 260px;
    background: linear-gradient(to bottom, transparent, rgba(0,255,120,0.5), rgba(0,180,255,0.5), transparent);
    align-self: center;
    flex-shrink: 0;
  }

  .code-block {
    background: rgba(0,255,120,0.04);
    border: 1px solid rgba(0,255,120,0.2);
    border-left: 3px solid #00ff78;
    border-radius: 6px;
    padding: 28px 32px;
    align-self: center;
    position: relative;
    box-shadow:
      0 0 30px rgba(0,255,120,0.06),
      inset 0 0 40px rgba(0,0,0,0.3);
  }

  .code-block::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(to right, #00ff78, transparent);
    opacity: 0.4;
  }

  .code-line {
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    line-height: 1.8;
    white-space: pre;
  }

  .tag { color: #00b4ff; }
  .bracket { color: rgba(0,180,255,0.5); }
  .indent { color: rgba(0,255,120,0.3); }

  .cursor {
    display: inline-block;
    width: 12px;
    height: 22px;
    background: #00ff78;
    vertical-align: middle;
    margin-left: 4px;
    animation: blink 1s step-end infinite;
    box-shadow: 0 0 8px rgba(0,255,120,0.8);
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .corner-tl, .corner-br {
    position: absolute;
    width: 24px; height: 24px;
    border-color: rgba(0,255,120,0.4);
    border-style: solid;
  }
  .corner-tl { top: 18px; left: 18px; border-width: 2px 0 0 2px; }
  .corner-br { bottom: 18px; right: 18px; border-width: 0 2px 2px 0; }
</style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow-green"></div>
  <div class="bg-glow-blue"></div>

  <div class="corner-tl"></div>
  <div class="corner-br"></div>

  <div class="content">
    <div class="left">
      <div class="html-title">HTML</div>
      <div class="part-label">Part 1</div>
    </div>

    <div class="divider"></div>

    <div class="code-block">
      <div class="code-line"><span class="bracket">&lt;</span><span class="tag">html</span><span class="bracket">&gt;</span></div>
      <div class="code-line">  <span class="bracket">&lt;</span><span class="tag">body</span><span class="bracket">&gt;</span></div>
      <div class="code-line">  </div>
      <div class="code-line">  <span class="bracket">&lt;/</span><span class="tag">body</span><span class="bracket">&gt;</span></div>
      <div class="code-line"><span class="bracket">&lt;/</span><span class="tag">html</span><span class="bracket">&gt;</span><span class="cursor"></span></div>
    </div>
  </div>
</body>
</html>
