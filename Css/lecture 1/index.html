<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Css fundamental</title>

  
  <link rel="stylesheet" href="introToCss.css">

  <style>
    /* for class selector*/
    .hello1{
      color: brown;
      background-color: aquamarine;
    } 
    .hello2{
      color: brown;
      background-color: black;
    } 
    /* for group selector
    .hello1,.hello2{
      color: brown;
      background-color: aquamarine;
    } */

    /* for id selector */
    /* #hello1{
      color: brown;
      background-color: aquamarine;
    } */
  </style>



  
</head>
<body>
  <!-- Inline Css -->

  <h1 style="
    color: aqua;
    background-color: black;
    text-align: center;
    ">Hello
  </h1>

  <!-- Internal Css -->
  <h1 class="hello1">Hello1</h1>
  <h1 class="hello1">Hello2</h1>
  <h1 class="hello1">Hello3</h1>
  <p class="hello2">Lorem ipsum dolor sit amet consectetur, adipisicing elit. Repellat eos sapiente excepturi, laudantium iure suscipit omnis molestias minima alias. Officiis!</p>

  <!--External Css -->
  <h1 class="hello3">Sayeel</h1>
  <h1>universal</h1>
</body>
</html>
